{% extends "base.html" %}
{% block title %}Edit Product — John Mark Cloth{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Edit Product</h1>
        <p class="page-sub">Update the details for: <strong>{{ product.name }}</strong></p>
    </div>
    <a href="{{ url_for('dashboard') }}" class="btn-secondary">← Back</a>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('edit_product', product_id=product.id) }}" novalidate>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Product Name *</label>
                <input type="text" name="name" class="form-control"
                       value="{{ product.name }}" required />
            </div>
            <div class="form-group">
                <label class="form-label">Category *</label>
                <select name="category" class="form-control" required>
                    {% for cat in ['Dress','Dungaree','Ethnic','Casual','Bottom','Infant','Uniform','Top','Outerwear'] %}
                    <option {% if product.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Age Group</label>
                <select name="age_group" class="form-control">
                    {% for ag in ['0-1 years','2-4 years','3-5 years','5-7 years','6-8 years','8-10 years','9-12 years'] %}
                    <option {% if product.age_group == ag %}selected{% endif %}>{{ ag }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Size</label>
                <select name="size" class="form-control">
                    {% for sz in ['XS','S','M','L','XL'] %}
                    <option {% if product.size == sz %}selected{% endif %}>{{ sz }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Color</label>
                <input type="text" name="color" class="form-control"
                       value="{{ product.color }}" />
            </div>
            <div class="form-group">
                <label class="form-label">Price (₹) *</label>
                <input type="number" name="price" class="form-control"
                       value="{{ product.price }}" min="1" step="0.01" required />
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Stock Quantity</label>
                <input type="number" name="stock" class="form-control"
                       value="{{ product.stock }}" min="0" />
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <input type="text" name="description" class="form-control"
                       value="{{ product.description or '' }}" />
            </div>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('dashboard') }}" class="btn-secondary">Cancel</a>
            <button type="submit" class="btn-primary">Save Changes →</button>
        </div>
    </form>
</div>
{% endblock %}
